spring.application.name=finalShop

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database=postgresql

spring.datasource.url=jdbc:postgresql://localhost:5432/products_uqc2

spring.datasource.username=postgres
spring.datasource.password=1234

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.generate-ddl=true
spring.jpa.show-sql=true

spring.flyway.baseline-on-migrate=true

springdoc.api-docs.path=src/main/resources/openapi.yaml
springdoc.swagger-ui.url=/swagger-ui.html
springdoc.cache.disabled=true

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

server.port=8080

# ---------- Spring Actuator (описание и health для мониторинга) ----------
management.endpoints.web.exposure.include=health,info,metrics,env,beans,loggers
management.endpoint.health.show-details=always

# Включаем информацию о Java и ОС в /actuator/info
management.info.java.enabled=true
management.info.os.enabled=true

# Эти endpoint'ы должны быть доступны при конфигурации exposure/include выше
management.endpoint.env.enabled=true
management.endpoint.beans.enabled=true
management.endpoint.loggers.enabled=true
management.endpoint.metrics.enabled=true

# ---------- Конфигурация логирования ----------
# Access logs для Tomcat (нужны для анализа HTTP-запросов)
server.tomcat.accesslog.enabled=true

# Цветной вывод в консоль для читаемости
spring.output.ansi.enabled=ALWAYS